<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido - Gregorio T. Rodriguez</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f0; min-height: 100vh; }

  .page { max-width: 900px; margin: 0 auto; background: #fff; }

  .header { text-align: center; padding: 20px 16px 12px; border-bottom: 1px solid #ccc; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.1em; color: #111; }
  .header p { font-size: 13px; color: #666; margin-top: 4px; }
  .date-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; font-size: 13px; color: #555; }
  .date-row input[type="date"] { font-size: 13px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px; background: #fff; color: #111; }

  .columns { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #ccc; }
  .col { border-right: 1px solid #ccc; }
  .col:last-child { border-right: none; }

  .col-header { display: grid; grid-template-columns: 52px 1fr 60px; background: #f0ede5; border-bottom: 1px solid #bbb; }
  .col-header span { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.06em; padding: 5px 3px; text-align: center; border-right: 1px solid #ccc; }
  .col-header span:last-child { border-right: none; }

  .item { display: grid; grid-template-columns: 52px 1fr 60px; border-bottom: 1px solid #e8e8e8; align-items: center; }
  .item:last-child { border-bottom: none; }

  .item input[type="text"] { font-size: 11px; padding: 3px 4px; border: none; border-right: 1px solid #e8e8e8; background: transparent; color: #111; text-align: center; width: 100%; height: 26px; outline: none; }
  .item input[type="text"]:focus { background: #fffbe6; }
  .item-name { font-size: 11px; padding: 3px 5px; color: #222; border-right: 1px solid #e8e8e8; line-height: 1.3; min-height: 26px; display: flex; align-items: center; }
  .price-input { border-right: none !important; }

  .actions { padding: 14px 16px; display: flex; gap: 10px; justify-content: center; border-top: 1px solid #ccc; background: #fafaf7; flex-wrap: wrap; }
  .btn { font-size: 13px; padding: 9px 20px; border-radius: 8px; border: 1px solid #bbb; background: #fff; color: #222; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500; transition: background 0.15s; }
  .btn:hover { background: #f0ede5; }
  .btn-primary { background: #2d5a1b; color: #fff; border-color: #2d5a1b; }
  .btn-primary:hover { background: #235015; }
  .btn-danger { color: #b91c1c; border-color: #fca5a5; }
  .btn-danger:hover { background: #fef2f2; }

  .footer { text-align: center; padding: 8px; font-size: 11px; color: #aaa; border-top: 1px solid #eee; }

  @media (max-width: 600px) {
    .columns { grid-template-columns: 1fr; }
    .col { border-right: none; border-bottom: 1px solid #ccc; }
    .col:last-child { border-bottom: none; }
  }

  @media print {
    body { background: #fff; }
    .actions { display: none; }
    .footer { display: none; }
    .header p { display: none; }
    .item input[type="text"]:focus { background: transparent; }
    .page { max-width: 100%; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>GREGORIO T. RODRIGUEZ</h1>
    <p>Completá cantidad y precio — luego imprimí o guardá como PDF</p>
    <div class="date-row">
      📅 Fecha del pedido:
      <input type="date" id="fecha" />
    </div>
  </div>

  <div class="columns" id="grid"></div>

  <div class="actions">
    <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    <button class="btn" onclick="copiarResumen()">📋 Copiar resumen</button>
    <button class="btn btn-danger" onclick="limpiarTodo()">🗑️ Limpiar todo</button>
  </div>

  <div class="footer">Los datos se guardan automáticamente en este navegador</div>
</div>

<script>
const articulos = [
  ["ACELGA","ACELGA AT. ZONA","ACELGA FARDO","ALCAUCIL","AJI DULCE","AJI PICANTE","AJO PUERRO","AJOS","ALBAHACA ATADO","ALBAHACA CAJON","ARANDANOS","ANANA","APIO BLANCO","APIO VERDE","ARVEJAS","BANANAS","BATATAS","BERENJENAS","BERGAMOTA","BERRO","BROCOLI","BROTE DE SOJA","CALABACITA","CARBON LEÑA","CEBOLLA","CEBOLLA BLANCA","CEBOLLA MORADA","CEBOLLIN","CEBOLLIN AT ZONA","CEREZAS","CIBULLETTE","CILANTRO","CILANTRO ZONA","CIRUELA","CIRUELA BLANCA","CIRUELA NEGRA","CIRUELA ROJA","COCO CASTAÑO","COLIFLOR","CHAMPIGNON","CHAUCHA CHATA","CHAUCHAS REDOND","CHOCLO BJA","CHOCLOS","DAMASCOS","JENGIBRE"],
  ["DURAZNOS","DURAZNOS","DURAZNOS","ECHALOTE","ENVIDIA","ESCAROLA ZONA","ESCAROLAS","ESPARRAGOS","ESPINACA ZONA","ESPINACAS","FRUTILLAS X BJA.","FRUTILLA X KILO","GRANADA","HABAS","HINOJOS","HUEVO BCO","HUEVO MARRON EST","HUEVO MARRON MAP","KINOTO","KIWI","KIWI","LECHUGA AT ZONA","LECHUGA CRESPA","LECHUGA MANTECA","LECHUGA MORADA","LECHUGA REPOLLAD","LIMA","LIMONES","MANDARINAS","MANDARINAS","MANDIOCA","MANGO","MANZANA DELICIOSA","MANZANA GOLDEN","MANZANA ROMEL","MANZANA SMITH","MELON AMARILLO","MELON BLANCO","MEMBRILLO","MORRON ROJO","MORRON VERDE","NABO","NARANJA OMBLIGO","NARANJAS","NARANJA BOLSITA","NUECES","MENTA"],
  ["PALTAS","PAPA BOLSA","PAPA KILO","PAPA X 10 KILOS","PAPAS","PELONES","PEPINO DULCE","PEPINOS","PERA ASIATICA","PERAS","PEREJIL","PEREJIL AT.ZONA","POMELO BLANCO","POMELO ROJO","POMELO ROSADO","RABANITO","RABANITO AT.ZONA","RADICHETA","RADICHETA AT.ZONA","REMOLACHA BOLSA","REMOLACHA FARDO","REPOLLO BLANCO","REPOLLO COLORAD","REPOLLO BRUSELA","RUCULA","SANDIA","TOMATE CHERRY","TOMATE L.VIDA","TOMATE PERITA","TOMATE REDONDO","UVA MOSCATEL","UVAS BLANCAS","UVAS NEGRAS","UVAS ROSAS","ZANAHORIAS","ZANAHORIA FRACC","ZANAHORIA FRACC","ZAPALLITO ITALIAN","ZAPALLITO VERDE","ZAPALLO INGLES","ZAPALLO"]
];

const hoy = new Date();
document.getElementById('fecha').value = hoy.toISOString().split('T')[0];

const grid = document.getElementById('grid');
articulos.forEach((col, ci) => {
  const colDiv = document.createElement('div');
  colDiv.className = 'col';
  colDiv.innerHTML = `<div class="col-header"><span>CANTIDAD</span><span>ARTÍCULO</span><span>PRECIO</span></div>`;
  col.forEach((art, ai) => {
    const key = `ped_${ci}_${ai}`;
    let saved = {q:'',p:''};
    try { saved = JSON.parse(localStorage.getItem(key)) || {q:'',p:''}; } catch(e){}
    const item = document.createElement('div');
    item.className = 'item';
    item.innerHTML = `
      <input type="text" inputmode="decimal" value="${saved.q}" data-key="${key}" data-field="q" aria-label="Cantidad ${art}" placeholder="" />
      <span class="item-name">${art}</span>
      <input type="text" inputmode="decimal" value="${saved.p}" data-key="${key}" data-field="p" aria-label="Precio ${art}" placeholder="" class="price-input" />
    `;
    colDiv.appendChild(item);
  });
  grid.appendChild(colDiv);
});

grid.addEventListener('input', e => {
  if (e.target.tagName === 'INPUT') {
    const key = e.target.dataset.key;
    const field = e.target.dataset.field;
    let saved = {q:'',p:''};
    try { saved = JSON.parse(localStorage.getItem(key)) || {q:'',p:''}; } catch(e){}
    saved[field] = e.target.value;
    localStorage.setItem(key, JSON.stringify(saved));
  }
});

function limpiarTodo() {
  if (!confirm('¿Limpiar todos los valores del pedido?')) return;
  document.querySelectorAll('#grid input').forEach(i => { i.value = ''; });
  Object.keys(localStorage).filter(k => k.startsWith('ped_')).forEach(k => localStorage.removeItem(k));
}

function copiarResumen() {
  const fecha = document.getElementById('fecha').value;
  let texto = `PEDIDO GREGORIO T. RODRIGUEZ\nFecha: ${fecha}\n${'─'.repeat(40)}\n`;
  let hayItems = false;
  articulos.forEach((col, ci) => {
    col.forEach((art, ai) => {
      const key = `ped_${ci}_${ai}`;
      let saved = {q:'',p:''};
      try { saved = JSON.parse(localStorage.getItem(key)) || {q:'',p:''}; } catch(e){}
      if (saved.q) {
        texto += `${saved.q.padEnd(6)} ${art}${saved.p ? '   $' + saved.p : ''}\n`;
        hayItems = true;
      }
    });
  });
  if (!hayItems) { alert('No hay ítems cargados todavía.'); return; }
  navigator.clipboard.writeText(texto).then(() => alert('✅ Resumen copiado al portapapeles!')).catch(() => {
    prompt('Copiá este texto:', texto);
  });
}
</script>
</body>
</html>
